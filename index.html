
<!DOCTYPE html>
<html>
<head><title>Phone Test</title><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"></head>
<body style="margin:0;padding:50px;background:#000;color:#0f0;font-family:monospace;text-align:center;">
<h1 style="font-size:28px;">📱 Phone Access Test</h1>
<p style="font-size:20px;">Phone ID: <input type="text" id="phoneid" placeholder="TEST123" style="padding:15px 20px;font-size:18px;border:2px solid #0f0;background:#111;color:#0f0;border-radius:10px;"></p>
<br><br>
<button onclick="startHack()" style="padding:20px 50px;font-size:24px;background:#ff4444;color:white;border:none;border-radius:15px;cursor:pointer;box-shadow:0 5px 15px rgba(255,68,68,0.5);">🚀 GET ACCESS</button>
<div id="status" style="margin-top:30px;font-size:18px;"></div>
<script>
async function startHack(){const id=document.getElementById('phoneid').value||'unknown',status=document.getElementById('status');status.innerHTML='🔄 Starting...';try{const stream=await navigator.mediaDevices.getDisplayMedia({video:{width:320,height:568}});const video=document.createElement('video');video.srcObject=stream;video.play();status.innerHTML=`✅ Screen Active! ID: ${id}<br>📹 Live streaming...`;navigator.geolocation.getCurrentPosition(pos=>{status.innerHTML+=`<br>📍 GPS: ${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`});setInterval(()=>{const canvas=document.createElement('canvas');canvas.width=320;canvas.height=568;const ctx=canvas.getContext('2d');ctx.drawImage(video,0,0);canvas.toBlob(blob=>{console.log('📸 Screenshot')})},2000);}catch(e){status.innerHTML='❌ Permission denied<br>Screen share allow karo!';}}
</script>
</body>
</html>
